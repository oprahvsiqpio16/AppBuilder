
plugins {
    id  com.android.application 
}

android {
    compileSdk 33
    namespace "com.example.appbuilder"

    defaultConfig {
        applicationId "com.example.appbuilder"
        minSdk 21
        targetSdk 33
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }
}

dependencies {
    implementation  androidx.appcompat:appcompat:1.6.1 
    implementation  com.squareup.okhttp3:okhttp:4.10.0  // مكتبة إرسال الملفات للبوت
}

